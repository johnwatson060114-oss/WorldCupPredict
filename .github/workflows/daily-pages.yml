name: Daily forecast and GitHub Pages

on:
  workflow_dispatch:
  schedule:
    # 05:10 UTC = 13:10 Asia/Shanghai, a fallback if the 13:00 local dispatch is unavailable.
    - cron: '10 5 * * *'
  push:
    branches: [main, master]
    paths-ignore:
      - 'public/data/history/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: pip install -r requirements.txt
      - run: npm install
      - name: Check for a recent local forecast
        id: forecast_freshness
        if: github.event_name == 'schedule'
        shell: python
        run: |
          import json
          import os
          from datetime import datetime, timedelta
          from pathlib import Path
          from zoneinfo import ZoneInfo

          path = Path('public/data/daily-forecast.json')
          recent = False
          if path.exists():
              payload = json.loads(path.read_text(encoding='utf-8'))
              timezone = ZoneInfo('Asia/Shanghai')
              now = datetime.now(timezone)
              generated = datetime.fromisoformat(payload['generatedAt']).astimezone(timezone)
              recent = now - generated <= timedelta(minutes=30)
              recent = recent and payload.get('targetDate') == (now.date() + timedelta(days=1)).isoformat()
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f'recent={str(recent).lower()}\n')
      - name: Generate next Beijing-day forecast
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.forecast_freshness.outputs.recent != 'true')
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          python -m pipeline.settle
          python -m pipeline.generate --archive
          python -m pipeline.strategy_history
      - run: python -m pytest -q
      - run: npm run build
      - name: Commit forecast history
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && steps.forecast_freshness.outputs.recent != 'true')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "data: archive daily forecast [skip ci]"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
